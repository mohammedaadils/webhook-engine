# ─── MySQL DataSource ─────────────────────────────────────────────────────────
# All sensitive values read from environment variables (set via .env + Docker Compose).
# Never hardcode credentials here.
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:webhookdb}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}

# ─── Connection Pool (HikariCP defaults are fine; tune if needed) ─────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# update: creates tables if missing, alters columns if schema changed.
# Safe for a first deploy. Switch to 'validate' once schema is stable.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.aadil.webhookengine=INFO
logging.level.org.springframework.web=WARN
