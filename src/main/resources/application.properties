# ─── Active profile ───────────────────────────────────────────────────────────
# Uncomment "prod" when running with Docker / EC2.
# Switch by passing: -Dspring.profiles.active=prod
spring.profiles.active=dev

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── Application name ─────────────────────────────────────────────────────────
spring.application.name=webhook-engine

# ─── Jackson ──────────────────────────────────────────────────────────────────
# ISO-8601 timestamps in all JSON responses (no epoch millis)
spring.jackson.serialization.write-dates-as-timestamps=false
