# ─── H2 In-Memory DataSource ──────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:webhookdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ─── H2 Console (http://localhost:8080/h2-console) ────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# create-drop: schema is created on startup, dropped on shutdown.
# Perfect for dev — fresh DB every run.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.aadil.webhookengine=DEBUG
logging.level.org.springframework.web=DEBUG
